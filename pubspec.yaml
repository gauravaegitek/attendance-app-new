name: attendance_app
description: Attendance Management App with GPS & Selfie Verification
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ---------------- LOCATION ----------------
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # ---------------- STATE MANAGEMENT ----------------
  get: ^4.6.6
  get_storage: ^2.1.1

  # ---------------- DEVICE / BIOMETRIC ----------------
  device_info_plus: ^9.0.0
  local_auth: ^2.3.0

  # ---------------- NETWORK ----------------
  http: ^1.2.1
  connectivity_plus: ^6.0.3  # ✅ ADDED

  # ---------------- STORAGE ----------------
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # ---------------- CAMERA ----------------
  image_picker: ^1.0.7
  permission_handler: ^11.3.0

  # ---------------- PDF EXPORT ----------------
  pdf: ^3.10.8
  open_file: ^3.3.2

  # ---------------- UI ----------------
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

  # ---------------- APP INFO ----------------
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true